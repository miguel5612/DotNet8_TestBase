<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Local Selenium Form</title>
    <style>
        body {
            font-family: Segoe UI, sans-serif;
            margin: 2rem;
            background: #f5f7fb;
            color: #13213c;
        }

        form {
            display: grid;
            gap: 0.75rem;
            max-width: 32rem;
            padding: 1.5rem;
            border-radius: 1rem;
            background: white;
            box-shadow: 0 10px 30px rgba(19, 33, 60, 0.08);
        }

        textarea {
            min-height: 7rem;
        }

        #message {
            margin-top: 1rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1>Local Web Form</h1>
    <form id="candidate-form">
        <input id="my-text-id" name="my-text" type="text" />
        <input id="my-password-id" name="my-password" type="password" />
        <textarea name="my-textarea"></textarea>
        <select name="my-select">
            <option>One</option>
            <option>Two</option>
            <option>Three</option>
        </select>
        <label><input id="my-check-1" type="checkbox" checked /> Default checkbox</label>
        <label><input id="my-radio-1" name="my-radio" type="radio" checked /> Default radio</label>
        <button type="submit">Submit</button>
    </form>
    <div id="message">Pending...</div>

    <script>
        document.getElementById("candidate-form").addEventListener("submit", function (event) {
            event.preventDefault();
            document.getElementById("message").textContent = "Received!";
        });
    </script>
</body>
</html>
