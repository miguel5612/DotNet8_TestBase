name: dotnet-tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  automation:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Restore
        run: dotnet restore FrameworkBase.Automation.sln

      - name: Build
        run: dotnet build FrameworkBase.Automation.sln --configuration Release --no-restore -m:1

      - name: API tests
        run: dotnet test tests/FrameworkBase.Automation.Api.Tests/FrameworkBase.Automation.Api.Tests.csproj --configuration Release --no-build --filter "Category=Api"

      - name: Web tests
        run: dotnet test tests/FrameworkBase.Automation.Web.Tests/FrameworkBase.Automation.Web.Tests.csproj --configuration Release --no-build --filter "Category=Web"

      - name: Desktop tests
        shell: pwsh
        run: |
          function Test-DesktopServer {
            try {
              Invoke-WebRequest -Uri http://127.0.0.1:4723/status -UseBasicParsing -TimeoutSec 5 | Out-Null
              return $true
            } catch {
              return $false
            }
          }

          $appiumProcess = $null
          $appiumOutLog = Join-Path $env:RUNNER_TEMP 'appium-server.out.log'
          $appiumErrLog = Join-Path $env:RUNNER_TEMP 'appium-server.err.log'
          $repoWadPath = Join-Path $env:GITHUB_WORKSPACE 'WindowsApplicationDriver_1.2.1\SourceDir\Windows Application Driver\WinAppDriver.exe'
          $calculatorAppId = 'Microsoft.WindowsCalculator_8wekyb3d8bbwe!App'

          if (-not (Test-DesktopServer)) {
            if (-not (Get-Command appium -ErrorAction SilentlyContinue)) {
              npm install -g appium
            }

            $installedDrivers = appium driver list --installed | Out-String
            if ($installedDrivers -notmatch 'windows') {
              appium driver install windows
            }

            if (-not (Test-Path $repoWadPath)) {
              appium driver run windows install-wad
            }

            $appiumProcess = Start-Process powershell -ArgumentList @(
              '-NoProfile',
              '-ExecutionPolicy', 'Bypass',
              '-File', 'scripts/start-appium.ps1'
            ) -RedirectStandardOutput $appiumOutLog -RedirectStandardError $appiumErrLog -WindowStyle Hidden -PassThru

            for ($attempt = 0; $attempt -lt 12; $attempt++) {
              Start-Sleep -Seconds 5
              if (Test-DesktopServer) {
                break
              }

              if ($appiumProcess.HasExited) {
                break
              }
            }
          }

          if (-not (Test-DesktopServer)) {
            Write-Warning 'Desktop automation server could not be started on 127.0.0.1:4723. Skipping desktop tests.'

            if (Test-Path $appiumOutLog) {
              Write-Host 'Appium stdout:'
              Get-Content $appiumOutLog
            }

            if (Test-Path $appiumErrLog) {
              Write-Host 'Appium stderr:'
              Get-Content $appiumErrLog
            }

            exit 0
          }

          $calculatorPackage = Get-AppxPackage -Name 'Microsoft.WindowsCalculator' -ErrorAction SilentlyContinue
          if (-not $calculatorPackage) {
            Write-Warning "Desktop AUT '$calculatorAppId' is not installed on this runner. Skipping desktop tests."
            exit 0
          }

          $env:AUTOMATION_Desktop__ApplicationId = $calculatorAppId

          try {
            dotnet test tests/FrameworkBase.Automation.Desktop.Tests/FrameworkBase.Automation.Desktop.Tests.csproj --configuration Release --no-build --filter "Category=Desktop"
          } finally {
            if ($appiumProcess -and -not $appiumProcess.HasExited) {
              Stop-Process -Id $appiumProcess.Id -Force
            }
          }
